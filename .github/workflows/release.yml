name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  GODOT_VERSION: 4.6.1
  GODOT_TEMPLATE_VERSION: 4.6.1.stable
  APP_NAME: TestCard

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: Linux/X11
            export_path: build/linux/TestCard.x86_64
            artifact_name: TestCard-linux-x86_64
            archive_name: TestCard-linux-x86_64.zip
            package_cmd: |
              cd build/linux
              zip -q -r "$GITHUB_WORKSPACE/dist/TestCard-linux-x86_64.zip" TestCard.x86_64 TestCard.pck
          - preset: Windows Desktop
            export_path: build/windows/TestCard.exe
            artifact_name: TestCard-windows-x86_64
            archive_name: TestCard-windows-x86_64.zip
            package_cmd: |
              cd build/windows
              zip -q -r "$GITHUB_WORKSPACE/dist/TestCard-windows-x86_64.zip" TestCard.exe TestCard.pck
          - preset: macOS
            export_path: build/macos/TestCard.app
            artifact_name: TestCard-macos-universal
            archive_name: TestCard-macos-universal.zip
            package_cmd: |
              cd build/macos
              zip -q -r "$GITHUB_WORKSPACE/dist/TestCard-macos-universal.zip" TestCard.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip

      - name: Install Godot editor
        shell: bash
        run: |
          mkdir -p tools/godot
          curl -L "https://downloads.godotengine.org/?flavor=stable&platform=linux.x86_64&slug=linux.x86_64.zip&version=$GODOT_VERSION" -o tools/godot.zip
          unzip -q tools/godot.zip -d tools/godot
          chmod +x tools/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64
          echo "GODOT_BIN=$PWD/tools/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64" >> "$GITHUB_ENV"

      - name: Install export templates
        shell: bash
        run: |
          templates_dir="$HOME/.local/share/godot/export_templates/$GODOT_TEMPLATE_VERSION"
          mkdir -p "$templates_dir"
          curl -L "https://downloads.godotengine.org/?flavor=stable&platform=export_templates.tpz&slug=export_templates.tpz&version=$GODOT_VERSION" -o tools/export_templates.tpz
          cp tools/export_templates.tpz tools/export_templates.zip
          unzip -q tools/export_templates.zip -d "$templates_dir"
          if [ -d "$templates_dir/templates" ]; then
            mv "$templates_dir"/templates/* "$templates_dir"/
            rmdir "$templates_dir/templates"
          fi
          find "$templates_dir" -maxdepth 1 -type f | sort

      - name: Export project
        shell: bash
        run: |
          mkdir -p "$(dirname "${{ matrix.export_path }}")"
          "$GODOT_BIN" --headless --verbose --path "$PWD" --export-release "${{ matrix.preset }}" "${{ matrix.export_path }}"
          find build -maxdepth 3 -type f | sort

      - name: Validate export outputs
        shell: bash
        run: |
          case "${{ matrix.preset }}" in
            "Linux/X11")
              test -f build/linux/TestCard.x86_64
              test -f build/linux/TestCard.pck
              ;;
            "Windows Desktop")
              test -f build/windows/TestCard.exe
              test -f build/windows/TestCard.pck
              ;;
            "macOS")
              test -d build/macos/TestCard.app
              ;;
          esac

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          ${{ matrix.package_cmd }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          shopt -s globstar nullglob
          files=(release-artifacts/**/*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No packaged artifacts found."
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --generate-notes --title "$RELEASE_TAG"
          fi
